<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>料金計算・契約フォーム</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #f5f5f5;
    }
    #app-container {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    /* お客様が入力するエリアの背景色（薄い黄色） */
    .active-section {
      background-color: #FCF7DE;
    }
    /* 先生が対応するエリアの背景色（薄いブルー） */
    .active-section-blue {
      background-color: #E6F2FF;
    }
    .inactive-section {
      background-color: #e0e0e0;
      opacity: 0.6;
      pointer-events: none;
    }
    .process-active {
      background-color: #cfe2f3ff;
    }
    .process-inactive {
      background-color: #e0e0e0;
      opacity: 0.6;
    }
    .primary-button {
      background-color: #F58220;
      color: white;
    }
    .primary-button:hover {
      background-color: #d66d0a;
    }
    .secondary-button {
      background-color: #6B7280; /* Gray-500 */
      color: white;
    }
    .secondary-button:hover {
      background-color: #4B5563; /* Gray-600 */
    }
    /* モーダル用のスタイル */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background-color: white;
      padding: 2.5rem 2rem;
      border-radius: 0.5rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .qr-placeholder {
      width: 250px;
      height: 250px;
      border: 2px dashed #666;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <div id="app-container"></div>
  
  <script type="text/babel">
    const App = () => {
      // 料金プラン設定
      const feeTable = {
        "フルタイム": {
          "月2回": 11480,
          "月3回": 16220,
          "月4回": 20960,
          "月6回": 31440
        },
        "平日フル": {
          "月2回": 10300,
          "月3回": 14450,
          "月4回": 18600,
          "月6回": 27900
        },
        "いつでも夕方": {
          "月2回": 9190,
          "月3回": 12780,
          "月4回": 16380,
          "月6回": 24570
        }
      };

      // 状態管理
      // currentStep: 1=プラン決め, 2=受講者情報, 2.2=確認事項, 2.3=ご署名, 2.4=アンケート, 2.5=プラン変更届, 3=お会計, 4=引落登録, 4.2=自宅登録案内, 4.5=振替口座登録, 4.8=Web口座振替, 5=完了
      const [currentStep, setCurrentStep] = React.useState(1);
      const [plan, setPlan] = React.useState("");
      const [frequency, setFrequency] = React.useState("");
      const [nextMonthPlan, setNextMonthPlan] = React.useState("");
      const [nextMonthFrequency, setNextMonthFrequency] = React.useState("");
      
      const [joinAtTrial, setJoinAtTrial] = React.useState(true);
      
      const [startTiming, setStartTiming] = React.useState("今月から始める");
      const [changePlanNextMonth, setChangePlanNextMonth] = React.useState(false);
      const [showPlanChangeForm, setShowPlanChangeForm] = React.useState(false);
      
      // モーダル・遅延適用管理用
      const [showLateModal, setShowLateModal] = React.useState(false);
      const [isDelayedChange, setIsDelayedChange] = React.useState(false);
      
      // 金額計算
      const [thisMonthFee, setThisMonthFee] = React.useState(0);
      const [nextMonthFee, setNextMonthFee] = React.useState(0);
      const [registrationFee, setRegistrationFee] = React.useState(5950);
      const [thisMonthTotal, setThisMonthTotal] = React.useState(0);
      const [nextMonthTotal, setNextMonthTotal] = React.useState(0);

      // 日付関連
      const today = new Date();

      // 来月の計算
      const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1, 1);
      const targetNextMonthNum = nextMonth.getMonth() + 1;
      
      // N月(今月+2か月)の計算（ポップアップのm月としても使用）
      const targetMonthAfterNext = new Date(today.getFullYear(), today.getMonth() + 2, 1).getMonth() + 1;
      const afterNextMonthLabel = `${targetMonthAfterNext}月`;
      
      // UI表示用のラベル（「来月」または「○月以降」）
      const nextMonthLabel = isDelayedChange ? `${targetMonthAfterNext}月以降` : "来月";

      // プラン変更適用日の計算（isDelayedChange が true なら再来月の1日、false なら来月の1日）
      const applyMonthOffset = isDelayedChange ? 2 : 1;
      const applyDate = new Date(today.getFullYear(), today.getMonth() + applyMonthOffset, 1);

      const formatDate = (date) => {
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();
        return `${year}年${month}月${day}日`;
      };

      // 利用開始日の計算
      const getStartDate = () => {
        if (startTiming === "今月から始める") {
          return formatDate(today);
        } else {
          const pureNextMonth = new Date(today.getFullYear(), today.getMonth() + 1, 1);
          return formatDate(pureNextMonth);
        }
      };

      // プラン変更チェックボックスがオフになったら遅延フラグもリセット
      React.useEffect(() => {
        if (!changePlanNextMonth) {
          setIsDelayedChange(false);
        }
      }, [changePlanNextMonth]);

      // 金額を再計算
      React.useEffect(() => {
        const currentRegistrationFee = joinAtTrial ? registrationFee - 1000 : registrationFee;

        if (!plan || !frequency) {
          setThisMonthFee(0);
          setNextMonthFee(0);
          setThisMonthTotal(currentRegistrationFee);
          setNextMonthTotal(0);
          return;
        }
        
        const monthlyFee = feeTable[plan][frequency];
        
        if (startTiming === "今月から始める") {
          setThisMonthFee(monthlyFee);
          
          let actualNextMonthFee = monthlyFee; // 今日の費用に含まれる「来月の月謝」
          let afterNextMonthFee = monthlyFee;  // N月以降の月謝
          
          // プラン変更がある場合
          if (changePlanNextMonth && nextMonthPlan && nextMonthFrequency) {
            const changedFee = feeTable[nextMonthPlan][nextMonthFrequency];
            
            if (isDelayedChange) {
              // 20日以降で「はい」が選ばれた遅延適用：来月は旧プラン、再来月(N月)から新プラン
              actualNextMonthFee = monthlyFee;
              afterNextMonthFee = changedFee;
            } else {
              // 通常のプラン変更適用：来月から新プラン
              actualNextMonthFee = changedFee;
              afterNextMonthFee = changedFee;
            }
          }
          
          setNextMonthFee(actualNextMonthFee);
          setThisMonthTotal(currentRegistrationFee + monthlyFee + actualNextMonthFee);
          setNextMonthTotal(afterNextMonthFee);
          
        } else {
          // 来月から始める場合
          setThisMonthFee(0);
          setNextMonthFee(monthlyFee);
          setThisMonthTotal(currentRegistrationFee + monthlyFee);
          setNextMonthTotal(monthlyFee);
        }
      }, [plan, frequency, joinAtTrial, startTiming, changePlanNextMonth, nextMonthPlan, nextMonthFrequency, isDelayedChange, registrationFee]);

      // 音声再生（お会計画面が表示されたときのみ鳴らす）
      React.useEffect(() => {
        if (currentStep === 3) {
          const audio = new Audio('./呼び出し音.mp3');
          audio.volume = 0.5;
          audio.play().catch(error => {
            console.log('音声の再生に失敗しました:', error);
          });
        }
      }, [currentStep]);

      // QRコードに表示すべきプランと回数を決定するロジック
      const getQRTarget = () => {
        let targetPlan = plan;
        let targetFrequency = frequency;

        if (changePlanNextMonth) {
          targetPlan = nextMonthPlan;
          targetFrequency = nextMonthFrequency;
        }
        
        return { targetPlan, targetFrequency };
      };

      // 入会金の表示金額を取得
      const getDisplayRegistrationFee = () => {
        return joinAtTrial ? registrationFee - 1000 : registrationFee;
      };

      // 次のステップへ進む処理
      const proceedToNextStep = () => {
        setCurrentStep(2);
        setTimeout(() => {
          document.getElementById('section-2')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      };

      const { targetPlan: qrPlan, targetFrequency: qrFreq } = getQRTarget();

      return (
        <div className="h-screen flex flex-col bg-gray-100">
          {/* プロセス表示部分 */}
          <div className="bg-white shadow-md p-4">
            <div className="flex justify-center items-center space-x-2">
              <div className={`px-4 py-2 rounded-lg font-bold text-sm ${currentStep === 1 ? 'process-active' : 'process-inactive'}`}>
                ①プラン決め
              </div>
              <div className="text-xl">→</div>
              <div className={`px-4 py-2 rounded-lg font-bold text-sm ${currentStep >= 2 && currentStep < 3 ? 'process-active' : 'process-inactive'}`}>
                ②確認書
              </div>
              {showPlanChangeForm && (
                <React.Fragment>
                  <div className="text-xl">→</div>
                  <div className={`px-4 py-2 rounded-lg font-bold text-sm ${currentStep === 2.5 ? 'process-active' : 'process-inactive'}`}>
                    ②-2プラン変更届
                  </div>
                </React.Fragment>
              )}
              <div className="text-xl">→</div>
              <div className={`px-4 py-2 rounded-lg font-bold text-sm ${currentStep === 3 ? 'process-active' : 'process-inactive'}`}>
                ③お会計
              </div>
              <div className="text-xl">→</div>
              <div className={`px-4 py-2 rounded-lg font-bold text-sm ${currentStep === 4 || currentStep === 4.2 || currentStep === 4.5 || currentStep === 4.8 ? 'process-active' : 'process-inactive'}`}>
                ④引き落とし登録
              </div>
              <div className="text-xl">→</div>
              <div className={`px-4 py-2 rounded-lg font-bold text-sm ${currentStep === 5 ? 'process-active' : 'process-inactive'}`}>
                ⑤完了
              </div>
            </div>
          </div>

          {/* メインコンテンツ */}
          <div className="flex-1 p-4 lg:p-8 overflow-auto">
            <div className="max-w-7xl mx-auto space-y-6">
              
              {/* ①プラン決めセクション */}
              <div id="section-1" className={`p-6 rounded-lg shadow-lg ${currentStep === 1 ? 'active-section' : 'inactive-section'}`}>
                <h2 className="text-2xl font-bold mb-6 text-center">①プランを決めよう</h2>
                
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                  {/* 左側：入力 */}
                  <div className="space-y-4">
                    <div className={changePlanNextMonth ? 'bg-white p-4 rounded-lg' : ''}>
                      <div>
                        <label className="block mb-2 font-medium text-lg">
                          {changePlanNextMonth ? '今月のプラン' : 'プラン'}
                        </label>
                        <select 
                          className="w-full p-3 border rounded text-lg"
                          value={plan}
                          onChange={(e) => setPlan(e.target.value)}
                          disabled={currentStep !== 1}
                        >
                          <option value="" disabled>プランを選んでください</option>
                          <option value="フルタイム">フルタイム</option>
                          <option value="平日フル">平日フル</option>
                          <option value="いつでも夕方">いつでも夕方</option>
                        </select>
                      </div>
                      
                      <div className="mt-4">
                        <label className="block mb-2 font-medium text-lg">
                          {changePlanNextMonth ? '今月の回数' : '回数'}
                        </label>
                        <select 
                          className="w-full p-3 border rounded text-lg"
                          value={frequency}
                          onChange={(e) => setFrequency(e.target.value)}
                          disabled={currentStep !== 1}
                        >
                          <option value="" disabled>回数を選んでください</option>
                          <option value="月2回">月2回</option>
                          <option value="月3回">月3回</option>
                          <option value="月4回">月4回</option>
                          <option value="月6回">月6回</option>
                        </select>
                      </div>
                    </div>
                    
                    <div className="flex items-center">
                      <input 
                        type="checkbox" 
                        id="joinAtTrial" 
                        className="mr-3 h-5 w-5"
                        checked={joinAtTrial}
                        onChange={(e) => setJoinAtTrial(e.target.checked)}
                        disabled={currentStep !== 1}
                      />
                      <label htmlFor="joinAtTrial" className="text-lg">体験時に入会</label>
                    </div>
                    
                    <div className="space-y-3 mt-4">
                      <div className="flex items-center">
                        <input 
                          type="radio" 
                          id="startThisMonth" 
                          name="startTiming"
                          className="mr-3 h-5 w-5"
                          value="今月から始める"
                          checked={startTiming === "今月から始める"}
                          onChange={(e) => setStartTiming(e.target.value)}
                          disabled={currentStep !== 1}
                        />
                        <label htmlFor="startThisMonth" className="text-lg">今月から始める</label>
                      </div>
                      
                      {startTiming === "今月から始める" && (
                        <div className="flex items-center ml-8">
                          <input 
                            type="checkbox" 
                            id="changePlanNextMonth" 
                            className="mr-3 h-5 w-5"
                            checked={changePlanNextMonth}
                            onChange={(e) => {
                              const isChecked = e.target.checked;
                              // 20日以降にチェックを入れた場合はポップアップを表示
                              if (isChecked && today.getDate() >= 20) {
                                setShowLateModal(true);
                                setChangePlanNextMonth(true);
                              } else {
                                setChangePlanNextMonth(isChecked);
                                setIsDelayedChange(false);
                              }
                            }}
                            disabled={currentStep !== 1}
                          />
                          <label htmlFor="changePlanNextMonth" className="text-lg">今月と来月でプランを変える</label>
                        </div>
                      )}
                      
                      <div className="flex items-center">
                        <input 
                          type="radio" 
                          id="startNextMonth" 
                          name="startTiming"
                          className="mr-3 h-5 w-5"
                          value="来月から始める"
                          checked={startTiming === "来月から始める"}
                          onChange={(e) => {
                            setStartTiming(e.target.value);
                            if (e.target.value === "来月から始める") {
                              setChangePlanNextMonth(false);
                              setIsDelayedChange(false);
                            }
                          }}
                          disabled={currentStep !== 1}
                        />
                        <label htmlFor="startNextMonth" className="text-lg">来月から始める</label>
                      </div>
                    </div>
                    
                    {changePlanNextMonth && startTiming === "今月から始める" && (
                      <div className="bg-white p-4 rounded-lg mt-4">
                        <div>
                          <label className="block mb-2 font-medium text-lg">{nextMonthLabel}のプラン</label>
                          <select 
                            className="w-full p-3 border rounded text-lg"
                            value={nextMonthPlan}
                            onChange={(e) => setNextMonthPlan(e.target.value)}
                            disabled={currentStep !== 1}
                          >
                            <option value="" disabled>プランを選んでください</option>
                            <option value="フルタイム">フルタイム</option>
                            <option value="平日フル">平日フル</option>
                            <option value="いつでも夕方">いつでも夕方</option>
                          </select>
                        </div>
                        
                        <div className="mt-4">
                          <label className="block mb-2 font-medium text-lg">{nextMonthLabel}の回数</label>
                          <select 
                            className="w-full p-3 border rounded text-lg"
                            value={nextMonthFrequency}
                            onChange={(e) => setNextMonthFrequency(e.target.value)}
                            disabled={currentStep !== 1}
                          >
                            <option value="" disabled>回数を選んでください</option>
                            <option value="月2回">月2回</option>
                            <option value="月3回">月3回</option>
                            <option value="月4回">月4回</option>
                            <option value="月6回">月6回</option>
                          </select>
                        </div>
                      </div>
                    )}
                  </div>
                  
                  {/* 右側：計算結果 */}
                  <div className="space-y-4">
                    <h3 className="font-bold text-xl border-b pb-2">今日の費用</h3>
                    <div className="flex justify-between items-baseline text-lg">
                      <span>入会費</span>
                      <span>
                        {getDisplayRegistrationFee().toLocaleString()}<span className="text-sm">円</span>
                      </span>
                    </div>
                    {/* 今月から始めるか来月から始めるかで内訳の行数を変更 */}
                    {startTiming === "今月から始める" ? (
                      <React.Fragment>
                        <div className="flex justify-between items-baseline text-lg">
                          <span>今月の月謝</span>
                          <span>{thisMonthFee.toLocaleString()}<span className="text-sm">円</span></span>
                        </div>
                        <div className="flex justify-between items-baseline text-lg">
                          <span>来月の月謝</span>
                          <span>{nextMonthFee.toLocaleString()}<span className="text-sm">円</span></span>
                        </div>
                      </React.Fragment>
                    ) : (
                      <div className="flex justify-between items-baseline text-lg">
                        <span>来月の月謝</span>
                        <span>{nextMonthFee.toLocaleString()}<span className="text-sm">円</span></span>
                      </div>
                    )}
                    
                    <div className="flex justify-between items-baseline font-bold text-xl border-t pt-2">
                      <span>今日の合計</span>
                      <span>{thisMonthTotal.toLocaleString()}<span className="text-sm">円</span></span>
                    </div>
                    
                    <h3 className={`font-bold text-xl border-b pb-2 ${changePlanNextMonth && startTiming === "今月から始める" ? 'mt-32' : 'mt-28'}`}>
                      {afterNextMonthLabel}以降の費用
                    </h3>
                    <div className="flex justify-between items-baseline text-lg">
                      <span>月謝</span>
                      <span>{nextMonthTotal.toLocaleString()}<span className="text-sm">円</span></span>
                    </div>
                  </div>
                </div>
                
                <div className="mt-8 flex justify-between">
                  <button 
                    className="primary-button px-8 py-4 rounded-lg text-xl font-bold disabled:opacity-50"
                    onClick={() => proceedToNextStep()}
                    disabled={!plan || !frequency || (changePlanNextMonth && (!nextMonthPlan || !nextMonthFrequency))}
                  >
                    プラン確定（次へ）
                  </button>
                </div>
              </div>

              {/* ②確認書セクション（1/4：受講者情報） */}
              <div id="section-2" className={`relative p-6 rounded-lg shadow-lg overflow-hidden ${currentStep === 2 ? 'active-section' : 'inactive-section'}`}>
                {/* イルカの背景 */}
                <div className="absolute -left-10 top-1/2 transform -translate-y-1/2 text-[250px] opacity-50 pointer-events-none select-none z-0">
                  🐬
                </div>

                <h2 className="text-2xl font-bold mb-6 text-center relative z-10">②確認書を書こう</h2>
                
                <div className="max-w-2xl mx-auto space-y-6 relative z-10">
                  <div className="bg-white p-6 rounded-lg">
                    <h3 className="font-bold text-xl border-b pb-2 mb-4">①受講者情報🐬</h3>
                    
                    <table className="w-full text-left border-collapse">
                      <tbody>
                        <tr className="border-b">
                          <th className="py-3 font-medium text-lg text-gray-700 w-2/5 align-middle">入会日</th>
                          <td className="py-3 text-xl font-bold align-middle">{formatDate(today)}</td>
                        </tr>
                        <tr className="border-b">
                          <th className="py-3 font-medium text-lg text-gray-700 align-middle">契約プラン</th>
                          <td className="py-3 align-middle">
                            <span className="text-xl font-bold text-red-600 border-2 border-red-600 rounded-full px-4 py-1 inline-block">
                              {plan || "未選択"}
                            </span>
                          </td>
                        </tr>
                        <tr className="border-b">
                          <th className="py-3 font-medium text-lg text-gray-700 align-middle">回数</th>
                          <td className="py-3 align-middle">
                            <span className="text-xl font-bold text-red-600 border-2 border-red-600 rounded-full px-4 py-1 inline-block">
                              {frequency || "未選択"}
                            </span>
                          </td>
                        </tr>
                        <tr className="border-b">
                          <th className="py-3 font-medium text-lg text-gray-700 align-middle">受講開始日</th>
                          <td className="py-3 text-xl font-bold align-middle">{getStartDate()}</td>
                        </tr>
                        <tr className="border-b">
                          <th className="py-3 font-medium text-lg text-gray-700 align-middle">今月のお月謝</th>
                          <td className="py-3 text-xl font-bold align-middle">{thisMonthFee.toLocaleString()}円／月</td>
                        </tr>
                        <tr>
                          <th className="py-3 font-medium text-lg text-gray-700 align-middle">来月以降のお月謝</th>
                          <td className="py-3 text-xl font-bold align-middle">{nextMonthFee.toLocaleString()}円／月</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  
                  <div className="flex justify-between mt-8">
                    <button 
                      className="px-6 py-3 bg-gray-500 text-white rounded-lg text-lg font-bold hover:bg-gray-600"
                      onClick={() => {
                        setCurrentStep(1);
                        setTimeout(() => {
                          document.getElementById('section-1')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 100);
                      }}
                    >
                      戻る
                    </button>
                    <button 
                      className="primary-button px-6 py-3 rounded-lg text-lg font-bold"
                      onClick={() => {
                        setCurrentStep(2.2);
                        setTimeout(() => {
                          document.getElementById('section-2-2')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 100);
                      }}
                    >
                      次へ
                    </button>
                  </div>
                </div>
              </div>

              {/* ②確認書セクション（2/4：確認・同意事項） */}
              <div id="section-2-2" className={`relative p-6 rounded-lg shadow-lg overflow-hidden ${currentStep === 2.2 ? 'active-section' : 'inactive-section'}`}>
                {/* リンゴの背景 */}
                <div className="absolute -left-10 top-1/2 transform -translate-y-1/2 text-[250px] opacity-50 pointer-events-none select-none z-0">
                  🍎
                </div>

                <h2 className="text-2xl font-bold mb-6 text-center relative z-10">②確認書を書こう</h2>
